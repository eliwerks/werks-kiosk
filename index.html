<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WERKS Kiosk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #ffffff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 700px;
    text-align: center;
    gap: 32px;
  }
  .screen.active { display: flex; }
  .step-label {
    font-size: 0.85em;
    color: #f0a500;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  h1 { font-size: 3em; letter-spacing: 2px; color: #f0a500; }
  h2 { font-size: 2em; color: #ffffff; }
  p { color: #aaa; font-size: 1.1em; }
  input, textarea, select {
    width: 100%;
    padding: 20px 24px;
    font-size: 1.4em;
    border-radius: 12px;
    border: 2px solid #444;
    background: #2a2a2a;
    color: #fff;
    outline: none;
    text-align: center;
    transition: border 0.2s;
    appearance: none;
  }
  input:focus, textarea:focus, select:focus { border-color: #f0a500; }
  textarea { height: 140px; resize: none; text-align: left; font-size: 1.1em; }
  select option { background: #2a2a2a; color: #fff; }
  .btn {
    padding: 20px 48px;
    font-size: 1.3em;
    font-weight: bold;
    background: #f0a500;
    color: #1a1a1a;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }
  .btn:hover { background: #ffc107; }
  .btn:disabled { background: #555; color: #888; cursor: not-allowed; }
  .btn-secondary {
    background: #2a2a2a;
    color: #aaa;
    font-size: 1em;
    padding: 14px;
    border: 2px solid #444;
  }
  .btn-secondary:hover { background: #333; }
  .btn-row { display: flex; gap: 16px; width: 100%; }
  .progress { display: flex; gap: 8px; margin-bottom: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
  .dot.active { background: #f0a500; }
  .dot.done { background: #666; }
  #qrcode { background: white; padding: 16px; border-radius: 12px; }
  .job-label {
    font-size: 0.8em;
    color: #ccc;
    background: #2a2a2a;
    padding: 12px 16px;
    border-radius: 8px;
    word-break: break-all;
    font-family: monospace;
    width: 100%;
  }
  #otherNameWrapper { display: none; width: 100%; margin-top: 8px; }
  .generating { color: #f0a500; font-size: 1.1em; }
</style>
</head>
<body>

<!-- Screen 0: Welcome -->
<div class="screen active" id="s0">
  <h1>WERKS</h1>
  <p>Employee photo upload portal</p>
  <button class="btn" onclick="goTo(1)">Upload Photos</button>
</div>

<!-- Screen 1: Employee Name -->
<div class="screen" id="s1">
  <div class="progress">
    <div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="step-label">Step 1 of 5</div>
  <h2>Employee Name</h2>
  <select id="techName" onchange="handleNameSelect()">
    <option value="">-- Select Name --</option>
    <option>Ben Ferland</option>
    <option>Caleb Larsen</option>
    <option>David Ferrara</option>
    <option>Eli Kogan</option>
    <option>Jamie Waldron</option>
    <option>Jeff Stone</option>
    <option>Levi Breasseau</option>
    <option>Mike Cimuchowski</option>
    <option>Robert Boreham</option>
    <option>Thomas McKenzie</option>
    <option>Wesley Kagan</option>
    <option>Whitney Gross</option>
    <option>Wyatt Goldfine</option>
    <option value="Other">Other</option>
  </select>
  <div id="otherNameWrapper">
    <input type="text" id="otherName" placeholder="Type your name" />
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="goTo(0)">Back</button>
    <button class="btn" onclick="nextName()">Next</button>
  </div>
</div>

<!-- Screen 2: Job Number -->
<div class="screen" id="s2">
  <div class="progress">
    <div class="dot done"></div><div class="dot active"></div><div class="dot">
